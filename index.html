<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Djurens Ljudspel</title>
  <style>
    :root {
      --bg-1: #fef6e4;
      --bg-2: #d7f0ff;
      --card: #ffffff;
      --text: #25324a;
      --accent: #ff8e3c;
      --accent-2: #4f86e6;
      --ok: #2bb673;
      --shadow: 0 12px 30px rgba(37, 50, 74, 0.14);
      --radius: 20px;
      --font: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(255, 224, 181, 0.72) 5%, transparent 38%),
        radial-gradient(circle at left bottom, rgba(189, 224, 255, 0.7) 10%, transparent 44%),
        linear-gradient(145deg, rgba(254, 246, 228, 0.92), rgba(215, 240, 255, 0.9)),
        url("assets/images/jungle-forest.svg") center top / cover no-repeat;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .game {
      width: min(980px, 100%);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 20px;
      border: 1px solid rgba(223, 235, 255, 0.9);
    }

    .header {
      background:
        radial-gradient(circle at 20% 22%, #fff1cd 0, #fff1cd 20%, transparent 48%),
        radial-gradient(circle at 88% 12%, #d8edff 0, #d8edff 23%, transparent 53%),
        linear-gradient(145deg, #fff9ef, #eef7ff);
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(37, 50, 74, 0.1);
      border: 1px solid #e7eefc;
      padding: 18px;
      margin-bottom: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 6px 0 0;
      font-size: clamp(1rem, 2.4vw, 1.08rem);
      color: #3e5073;
      font-weight: 600;
    }

    .score {
      font-size: 1rem;
      font-weight: 700;
      background: #f1f6ff;
      border-radius: 999px;
      padding: 8px 14px;
      border: 1px solid #d9e7ff;
      color: #31517a;
    }

    .header-side {
      display: grid;
      justify-items: end;
      gap: 8px;
    }

    .lang-switch {
      display: flex;
      gap: 8px;
    }

    .lang-btn {
      background: #ffffff;
      border: 1px solid #d3e3ff;
      color: #243754;
      font-size: 0.9rem;
      padding: 8px 11px;
      border-radius: 999px;
      box-shadow: 0 4px 10px rgba(60, 89, 134, 0.1);
    }

    .lang-btn.active {
      border-color: #8cb4f3;
      background: #e7f2ff;
      color: #20416b;
    }

    .prompt {
      background: #fff8ed;
      border: 2px dashed #ffc170;
      border-radius: 14px;
      box-shadow: 0 8px 18px rgba(244, 166, 76, 0.12);
      padding: 14px 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .prompt-text {
      font-size: clamp(0.98rem, 2vw, 1.1rem);
      line-height: 1.32;
      font-weight: 700;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }


    .tracker {
      background: #f7fbff;
      border-radius: 14px;
      border: 1px solid #d9e7ff;
      box-shadow: 0 8px 16px rgba(52, 83, 128, 0.1);
      padding: 12px 14px;
      margin: 0 0 14px;
    }

    .tracker-title {
      margin: 0 0 8px;
      font-size: 1rem;
      font-weight: 800;
    }

    .tracker-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      align-items: flex-start;
      gap: 8px;
    }

    .tracker-item {
      border-radius: 10px;
      background: #f9fcff;
      border: 1px solid #dbe9ff;
      min-height: 70px;
      width: 92px;
      flex: 0 0 92px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 6px;
      position: relative;
      opacity: 0.72;
      transition: transform 0.15s ease, opacity 0.2s ease, box-shadow 0.15s ease;
    }

    .tracker-item.done {
      opacity: 1;
      background: #effdf4;
      border-color: #7dd3a6;
      box-shadow: 0 7px 14px rgba(21, 128, 61, 0.12);
      transform: translateY(-1px);
    }

    .tracker-emoji {
      font-size: 1.8rem;
      line-height: 1;
    }

    .tracker-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #36547a;
    }

    .tracker-check {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #16a34a;
      color: #fff;
      font-weight: 900;
      font-size: 0.72rem;
      border: 1px solid #fff;
      box-shadow: 0 4px 8px rgba(22, 163, 74, 0.35);
      display: grid;
      place-items: center;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 8px 12px;
      transition: transform 0.14s ease, filter 0.18s ease, box-shadow 0.18s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 10px 20px rgba(249, 115, 22, 0.28);
    }

    .btn-secondary {
      background: #e7f2ff;
      color: #2d4f76;
      border: 1px solid #d3e3ff;
      box-shadow: 0 8px 16px rgba(52, 83, 128, 0.12);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 6px;
    }

    .animal-card {
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 8px 16px rgba(40, 60, 90, 0.12);
      border: 2px solid #ebf1ff;
      min-height: 160px;
      padding: 12px;
      display: grid;
      place-items: center;
      text-align: center;
      gap: 8px;
      touch-action: manipulation;
      user-select: none;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .animal-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(40, 60, 90, 0.14);
      border-color: #cedefe;
    }

    .animal-card.good {
      border-color: var(--ok);
      box-shadow: 0 10px 18px rgba(43, 182, 115, 0.2);
    }

    .animal-card.wiggle {
      animation: wiggle 250ms ease-in-out 2;
    }

    .photo-wrap {
      width: 124px;
      height: 90px;
      border-radius: 8px;
      overflow: hidden;
      background: #f4fbff;
      border: 2px solid #dce9fb;
      display: grid;
      place-items: center;
      position: relative;
      box-shadow: inset 0 1px 2px rgba(34, 63, 98, 0.08);
    }

    .animal-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .emoji-fallback {
      position: absolute;
      inset: 0;
      font-size: 3.2rem;
      line-height: 1;
      display: grid;
      place-items: center;
      background: #f4fbff;
    }

    .photo-wrap.has-photo .emoji-fallback {
      display: none;
    }

    .label {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .sound {
      font-size: 1rem;
      opacity: 0.8;
    }

    .footer-note {
      margin-top: 14px;
      font-size: 0.95rem;
      text-align: center;
      opacity: 0.85;
    }

    .success-fx {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      z-index: 30;
    }

    .success-fx.show {
      animation: fadeBurst 900ms ease-out forwards;
    }

    .success-core {
      width: 96px;
      height: 96px;
      border-radius: 999px;
      background: #35c759;
      color: #fff;
      font-size: 3rem;
      font-weight: 800;
      display: grid;
      place-items: center;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      transform: scale(0.6);
    }

    .success-fx.show .success-core {
      animation: popIn 380ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .success-ring {
      position: absolute;
      width: 112px;
      height: 112px;
      border-radius: 999px;
      border: 6px solid rgba(48, 183, 0, 0.6);
      transform: scale(0.4);
      opacity: 0;
    }

    .success-fx.show .success-ring {
      animation: ringOut 700ms ease-out 90ms forwards;
    }

    .reward-fx {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 29;
    }

    .surprise-fx {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 32;
      opacity: 0;
    }

    .surprise-fx.show {
      opacity: 1;
      animation: fadeBurst 1100ms ease-out forwards;
    }

    .surprise-core {
      min-width: 160px;
      min-height: 140px;
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, #fff9e6 0%, #ffe7b5 100%);
      border: 3px solid #ffd166;
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.18);
      display: grid;
      place-items: center;
      transform: scale(0.7);
      text-align: center;
      gap: 6px;
    }

    .surprise-fx.show .surprise-core {
      animation: popIn 380ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .surprise-emoji {
      font-size: 3rem;
      line-height: 1;
    }

    .surprise-text {
      font-size: 1rem;
      font-weight: 700;
      color: #775200;
    }

    .balloon {
      position: absolute;
      bottom: -90px;
      width: 54px;
      height: 68px;
      border-radius: 50% 50% 48% 48%;
      box-shadow: inset -8px -12px 0 rgba(0, 0, 0, 0.1);
      animation: floatUp 1200ms ease-out forwards;
    }

    .balloon::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      width: 2px;
      height: 42px;
      background: rgba(60, 80, 110, 0.35);
      transform: translateX(-50%);
    }

    .confetti {
      position: absolute;
      top: -16px;
      width: 10px;
      height: 14px;
      border-radius: 2px;
      animation: confettiDrop 1000ms linear forwards;
    }

    @keyframes popIn {
      0% { transform: scale(0.6); }
      75% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes ringOut {
      0% { transform: scale(0.4); opacity: 0.95; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    @keyframes fadeBurst {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.85); opacity: 0.95; }
      100% { transform: translateY(-75vh) scale(1); opacity: 0; }
    }

    @keyframes confettiDrop {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.95; }
      100% { transform: translateY(68vh) rotate(340deg); opacity: 0; }
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
    }

    @media (max-width: 560px) {
      .header {
        grid-template-columns: 1fr;
      }

      .score {
        justify-self: start;
      }

      .header-side {
        justify-items: start;
      }

      .animal-card {
        min-height: 140px;
      }

      .prompt {
        padding: 10px 12px;
        gap: 10px;
      }

      .prompt-text {
        font-size: 0.94rem;
      }

      .controls {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .controls button {
        padding: 8px 6px;
        font-size: 0.78rem;
        white-space: nowrap;
      }
    }
  </style>
</head>

    const surpriseEmoji = document.getElementById("surpriseEmoji");
    const surpriseText = document.getElementById("surpriseText");
    const titleText = document.getElementById("titleText");
    const subtitleText = document.getElementById("subtitleText");
    const footerText = document.getElementById("footerText");
    const langSvBtn = document.getElementById("langSv");
    const langEnBtn = document.getElementById("langEn");

    let currentLang = "en";
    let score = Number(localStorage.getItem("animalScore") || 0);
    const guessedAnimals = new Set(JSON.parse(localStorage.getItem("guessedAnimals") || "[]"));
    let challengeAnimal = null;
    let challengeActive = false;
    let lastCard = null;
    let currentClip = null;
    let successFxTimer = null;
    let rewardFxTimer = null;
    let surpriseFxTimer = null;
    let audioCtx = null;
    let promptKey = "warmup";
    let promptAnimalId = null;
    let paradeActive = false;
    let paradeTimer = null;
    let paradeIndex = 0;
    let ambientStarted = false;
    let ambientGain = null;
    let ambientNoiseSource = null;
    let ambientDroneOscA = null;
    let ambientDroneOscB = null;
    let ambientLfo = null;
    let ambientLfoGain = null;
    let ambientBirdTimer = null;
    const ambientVolume = 0.11;

    const audioByAnimal = new Map(
      animalCatalog.map((animal) => {
        const clip = new Audio(animal.audio);
        clip.preload = "auto";
        return [animal.id, clip];
      })
    );

    const imageCache = new Map();
    const imageLoaders = new Map();

    function loadAnimalImage(animal) {
      if (!animal.wikiPage) {
        return Promise.resolve(null);
      }
      if (imageCache.has(animal.id)) {
        return Promise.resolve(imageCache.get(animal.id));
      }
      if (imageLoaders.has(animal.id)) {
        return imageLoaders.get(animal.id);
      }

      const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(animal.wikiPage)}`;
      const loader = fetch(url)
        .then((res) => (res.ok ? res.json() : null))
        .then((data) => {
          const img = data && data.thumbnail && data.thumbnail.source ? data.thumbnail.source : null;
          imageCache.set(animal.id, img);
          return img;
        })
        .catch(() => {
          imageCache.set(animal.id, null);
          return null;
        })
        .finally(() => {
          imageLoaders.delete(animal.id);
        });

      imageLoaders.set(animal.id, loader);
      return loader;
    }

    function getWords(animalId) {
      return animalWords[currentLang][animalId] || animalWords.sv[animalId];
    }

    function speakFallback(text) {
      if (!("speechSynthesis" in window)) {
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.95;
      utterance.pitch = 1.1;
      utterance.volume = 1;
      window.speechSynthesis.speak(utterance);
    }

    function stopAllAudio() {
      if (currentClip) {
        currentClip.pause();
        currentClip.currentTime = 0;
        currentClip = null;
      }
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    function playAnimalSound(animal) {
      stopAllAudio();
      const clip = audioByAnimal.get(animal.id);
      const words = getWords(animal.id);
      if (!clip) {
        speakFallback(uiText[currentLang].says(words.name, words.sound));
        return;
      }

      clip.currentTime = 0;
      currentClip = clip;
      clip.play().catch(() => {
        currentClip = null;
        speakFallback(uiText[currentLang].says(words.name, words.sound));
      });
      clip.onended = () => {
        if (currentClip === clip) {
          currentClip = null;
        }
      };
    }

    function triggerSuccessAnimation() {
      if (!successFx) {
        return;
      }
      successFx.classList.remove("show");
      void successFx.offsetWidth;
      successFx.classList.add("show");
      clearTimeout(successFxTimer);
      successFxTimer = setTimeout(() => {
        successFx.classList.remove("show");
      }, 950);
    }

    function getAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return null;
      }
      audioCtx = audioCtx || new AudioContextClass();
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      return audioCtx;
    }

    function ensureAmbientGain() {
      const ctx = getAudioContext();
      if (!ctx) {
        return null;
      }
      if (!ambientGain) {
        ambientGain = ctx.createGain();
        ambientGain.gain.setValueAtTime(0.03, ctx.currentTime);
        ambientGain.connect(ctx.destination);
      }
      return { ctx, gainNode: ambientGain };
    }

    function setAmbientVolume(target) {
      const out = ensureAmbientGain();
      if (!out) {
        return;
      }
      const { ctx, gainNode } = out;
      gainNode.gain.cancelScheduledValues(ctx.currentTime);
      gainNode.gain.setTargetAtTime(target, ctx.currentTime, 0.25);
    }

    function createAmbientNoiseBuffer(ctx) {
      const seconds = 2;
      const bufferSize = Math.floor(ctx.sampleRate * seconds);
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < bufferSize; i += 1) {
        const white = Math.random() * 2 - 1;
        last = (last + (0.02 * white)) / 1.02;
        data[i] = last * 2.6;
      }
      return buffer;
    }

    function playAmbientBirdCall() {
      const out = ensureAmbientGain();
      if (!out) {
        return;
      }
      const { ctx, gainNode } = out;
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const chirpGain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(1400, now);
      osc.frequency.exponentialRampToValueAtTime(2200, now + 0.06);
      osc.frequency.exponentialRampToValueAtTime(1100, now + 0.18);
      chirpGain.gain.setValueAtTime(0.0001, now);
      chirpGain.gain.exponentialRampToValueAtTime(0.02, now + 0.02);
      chirpGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
      osc.connect(chirpGain);
      chirpGain.connect(gainNode);
      osc.start(now);
      osc.stop(now + 0.22);
    }

    function startAmbientMusic() {
      const out = ensureAmbientGain();
      if (!out || ambientStarted) {
        return;
      }
      const { ctx, gainNode } = out;
      ambientStarted = true;
      setAmbientVolume(ambientVolume);

      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = "bandpass";
      noiseFilter.frequency.value = 520;
      noiseFilter.Q.value = 0.6;
      const noiseGain = ctx.createGain();
      noiseGain.gain.value = 0.22;
      ambientNoiseSource = ctx.createBufferSource();
      ambientNoiseSource.buffer = createAmbientNoiseBuffer(ctx);
      ambientNoiseSource.loop = true;
      ambientNoiseSource.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(gainNode);
      ambientNoiseSource.start();

      const droneGainA = ctx.createGain();
      const droneGainB = ctx.createGain();
      droneGainA.gain.value = 0.035;
      droneGainB.gain.value = 0.026;
      ambientDroneOscA = ctx.createOscillator();
      ambientDroneOscB = ctx.createOscillator();
      ambientDroneOscA.type = "triangle";
      ambientDroneOscB.type = "sine";
      ambientDroneOscA.frequency.value = 98;
      ambientDroneOscB.frequency.value = 147;
      ambientDroneOscA.connect(droneGainA);
      ambientDroneOscB.connect(droneGainB);
      droneGainA.connect(gainNode);
      droneGainB.connect(gainNode);

      ambientLfo = ctx.createOscillator();
      ambientLfoGain = ctx.createGain();
      ambientLfo.type = "sine";
      ambientLfo.frequency.value = 0.085;
      ambientLfoGain.gain.value = 0.012;
      ambientLfo.connect(ambientLfoGain);
      ambientLfoGain.connect(droneGainA.gain);
      ambientLfoGain.connect(droneGainB.gain);

      ambientDroneOscA.start();
      ambientDroneOscB.start();
      ambientLfo.start();

      playAmbientBirdCall();
      ambientBirdTimer = setInterval(() => {
        if (Math.random() > 0.35) {
          playAmbientBirdCall();
        }
      }, 4800);
    }

    function unlockAudioOnFirstInteraction() {
      getAudioContext();
      startAmbientMusic();
      setAmbientVolume(ambientVolume);
    }

    function ensureAmbientOnVisibility() {
      if (document.visibilityState !== "visible") {
        return;
      }
      unlockAudioOnFirstInteraction();
    }

    function playSuccessTone() {
      const ctx = getAudioContext();
      if (!ctx) {
        return;
      }

      const now = ctx.currentTime;
      const notes = [784, 1046.5, 1318.5];
      notes.forEach((frequency, index) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(frequency, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.16, now + 0.02 + index * 0.07);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22 + index * 0.07);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + index * 0.07);
        osc.stop(now + 0.25 + index * 0.07);
      });
    }

    function playClapSound() {
      const ctx = getAudioContext();
      if (!ctx) {
        return;
      }

      const start = ctx.currentTime;
      [0, 0.085].forEach((offset) => {
        const bufferSize = Math.floor(ctx.sampleRate * 0.09);
        const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i += 1) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }

        const source = ctx.createBufferSource();
        const filter = ctx.createBiquadFilter();
        filter.type = "highpass";
        filter.frequency.value = 800;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.0001, start + offset);
        gain.gain.exponentialRampToValueAtTime(0.33, start + offset + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + offset + 0.12);
        source.buffer = noiseBuffer;
        source.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        source.start(start + offset);
        source.stop(start + offset + 0.13);
      });
    }

    function triggerBalloonReward() {
      if (!rewardFx) {
        return;
      }
      rewardFx.replaceChildren();
      clearTimeout(rewardFxTimer);

      const balloonColors = ["#ff5a5f", "#ffb400", "#2ec4b6", "#35a7ff", "#9c6bff", "#52c41a"];
      const balloonLefts = [8, 24, 40, 56, 72, 88];
      balloonLefts.forEach((left, index) => {
        const balloon = document.createElement("div");
        balloon.className = "balloon";
        balloon.style.left = `${left}%`;
        balloon.style.background = balloonColors[index % balloonColors.length];
        balloon.style.animationDelay = `${index * 40}ms`;
        rewardFx.appendChild(balloon);
      });

      const confettiColors = ["#ff8c42", "#35a7ff", "#30b700", "#ffd166", "#ef476f", "#06d6a0"];
      for (let i = 0; i < 18; i += 1) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = `${5 + i * 5}%`;
        piece.style.background = confettiColors[i % confettiColors.length];
        piece.style.animationDelay = `${(i % 6) * 35}ms`;
        rewardFx.appendChild(piece);
      }

      rewardFxTimer = setTimeout(() => {
        rewardFx.replaceChildren();
      }, 1300);
    }

    function triggerSurpriseReward() {
      if (!surpriseFx || !surpriseEmoji || !surpriseText) {
        return;
      }
      const prizes = ["🐣", "🦄", "🐬", "🦋", "🐼", "🐢", "🌟", "🎉"];
      const pick = prizes[Math.floor(Math.random() * prizes.length)];
      surpriseEmoji.textContent = pick;
      surpriseText.textContent = uiText[currentLang].surprise;

      surpriseFx.classList.remove("show");
      void surpriseFx.offsetWidth;
      surpriseFx.classList.add("show");
      clearTimeout(surpriseFxTimer);
      surpriseFxTimer = setTimeout(() => {
        surpriseFx.classList.remove("show");
      }, 1150);
      speakFallback(uiText[currentLang].surprise);
    }

    function saveScore() {
      localStorage.setItem("animalScore", String(score));
    }

    function saveGuessedAnimals() {
      localStorage.setItem("guessedAnimals", JSON.stringify(Array.from(guessedAnimals)));
    }

    function renderGuessTracker() {
      if (!trackerGrid || !trackerSection) {
        return;
      }

      const guessedList = animalCatalog.filter((animal) => guessedAnimals.has(animal.id));
      if (guessedList.length === 0) {
        trackerSection.style.display = "none";
        trackerGrid.replaceChildren();
        return;
      }

      trackerSection.style.display = "";
      const nodes = guessedList.map((animal) => {
        const words = getWords(animal.id);
        const node = document.createElement("div");
        node.className = "tracker-item done";
        node.setAttribute("aria-label", words.name);
        node.innerHTML = `<span class="tracker-emoji">${animal.emoji}</span><span class="tracker-label">${words.name}</span><span class="tracker-check">✓</span>`;
        return node;
      });
      trackerGrid.replaceChildren(...nodes);
    }

    function applyLanguage() {
      const t = uiText[currentLang];
      document.documentElement.lang = currentLang;
      document.title = t.title;
      titleText.textContent = t.title;
      subtitleText.textContent = t.subtitle;
      nextSoundBtn.textContent = t.nextSound;
      replaySoundBtn.textContent = t.replay;
      paradeModeBtn.textContent = paradeActive ? t.paradeStop : t.paradeStart;
      footerText.textContent = t.footer;
      trackerTitleNode.textContent = t.trackerTitle;
      grid.setAttribute("aria-label", t.gridAria);
      langSvBtn.classList.toggle("active", currentLang === "sv");
      langEnBtn.classList.toggle("active", currentLang === "en");
      langSvBtn.setAttribute("aria-pressed", String(currentLang === "sv"));
      langEnBtn.setAttribute("aria-pressed", String(currentLang === "en"));
      renderCards();
      renderGuessTracker();
      setPrompt(promptKey, promptAnimalId);
    }

    function stopParade(resetLabel = true) {
      paradeActive = false;
      clearTimeout(paradeTimer);
      paradeTimer = null;
      paradeIndex = 0;
      if (resetLabel) {
        paradeModeBtn.textContent = uiText[currentLang].paradeStart;
      }
    }

    function paradeStep() {
      if (!paradeActive) {
        return;
      }
      if (paradeIndex >= animalCatalog.length) {
        stopParade(false);
        setPrompt("warmup");
        promptText.textContent = uiText[currentLang].paradeDone;
        paradeModeBtn.textContent = uiText[currentLang].paradeStart;
        return;
      }

      const animal = animalCatalog[paradeIndex];
      const cardNode = grid.querySelector(`[data-animal="${animal.id}"]`);
      playAnimal(animal, cardNode);
      promptText.textContent = `${uiText[currentLang].paradePlaying} ${getWords(animal.id).name}`;
      paradeIndex += 1;
      paradeTimer = setTimeout(paradeStep, 2600);
    }

    function toggleParade() {
      if (paradeActive) {
        stopParade();
        setPrompt("warmup");
        return;
      }
      challengeActive = false;
      challengeAnimal = null;
      paradeActive = true;
      paradeIndex = 0;
      paradeModeBtn.textContent = uiText[currentLang].paradeStop;
      paradeStep();
    }

    function setPrompt(key, animalId = null) {
      promptKey = key;
      promptAnimalId = animalId;
      const t = uiText[currentLang];

      if (key === "challenge") {
        promptText.textContent = t.challenge;
        return;
      }
      if (key === "success" && animalId) {
        promptText.textContent = t.success(getWords(animalId).name);
        return;
      }
      if (key === "retry") {
        promptText.textContent = t.retry;
        return;
      }
      promptText.textContent = t.warmup;
    }

    function renderCards() {
      const cards = animalCatalog.map((animal) => {
        const words = getWords(animal.id);
        const button = document.createElement("button");
        button.className = "animal-card";
        button.setAttribute("type", "button");
        button.dataset.animal = animal.id;
        button.setAttribute("aria-label", `${words.name}: ${words.sound}`);
        button.innerHTML = `
          <span class="photo-wrap" data-photo-wrap>
            <img class="animal-photo" alt="${words.name}" loading="lazy" />
            <span class="emoji-fallback" aria-hidden="true">${animal.emoji}</span>
          </span>
          <span class="label">${words.name}</span>
          <span class="sound">${words.sound}</span>
        `;

        const photoWrap = button.querySelector("[data-photo-wrap]");
        const photo = button.querySelector(".animal-photo");
        loadAnimalImage(animal).then((src) => {
          if (!src || !photo || !photoWrap) {
            return;
          }
          photo.src = src;
          photoWrap.classList.add("has-photo");
        });

        button.addEventListener("click", () => {
          playAnimal(animal, button);
          if (challengeActive) {
            evaluateChoice(animal, button);
          }
        });
        return button;
      });

      grid.replaceChildren(...cards);
      lastCard = null;
    }

    function playAnimal(animal, cardNode) {
      if (lastCard) {
        lastCard.classList.remove("good");
      }
      playAnimalSound(animal);
      if (cardNode) {
        cardNode.classList.add("good");
        lastCard = cardNode;
      }
    }

    function startChallenge() {
      stopParade();
      challengeAnimal = animalCatalog[Math.floor(Math.random() * animalCatalog.length)];
      challengeActive = true;
      setPrompt("challenge");
      playChallengeSound();
    }

    function playChallengeSound() {
      if (!challengeAnimal) {
        startChallenge();
        return;
      }
      playAnimalSound(challengeAnimal);
    }

    function evaluateChoice(animal, cardNode) {
      if (!challengeAnimal) {
        return;
      }

      if (animal.id === challengeAnimal.id) {
        score += 1;
        guessedAnimals.add(animal.id);
        saveScore();
        saveGuessedAnimals();
        renderGuessTracker();
        setPrompt("success", animal.id);
        cardNode.classList.add("good");
        triggerSuccessAnimation();
        playSuccessTone();
        playClapSound();
        speakFallback(uiText[currentLang].praise);
        triggerBalloonReward();
        if (score % 3 === 0) {
          triggerSurpriseReward();
        }
        challengeActive = false;
      } else {
        cardNode.classList.add("wiggle");
        setPrompt("retry");
        setTimeout(() => cardNode.classList.remove("wiggle"), 700);
      }
    }

    function setLanguage(lang) {
      if (lang !== "sv" && lang !== "en") {
        return;
      }
      currentLang = lang;
      applyLanguage();
    }

    nextSoundBtn.addEventListener("click", startChallenge);
    replaySoundBtn.addEventListener("click", playChallengeSound);
    paradeModeBtn.addEventListener("click", toggleParade);
    langSvBtn.addEventListener("click", () => setLanguage("sv"));
    langEnBtn.addEventListener("click", () => setLanguage("en"));
    document.addEventListener("pointerdown", unlockAudioOnFirstInteraction, { once: true });
    document.addEventListener("touchstart", unlockAudioOnFirstInteraction, { once: true });
    document.addEventListener("click", unlockAudioOnFirstInteraction, { once: true });
    document.addEventListener("keydown", unlockAudioOnFirstInteraction, { once: true });
    document.addEventListener("visibilitychange", ensureAmbientOnVisibility);
    window.addEventListener("load", unlockAudioOnFirstInteraction);

    applyLanguage();
    unlockAudioOnFirstInteraction();
  </script>
</body>
</html>
